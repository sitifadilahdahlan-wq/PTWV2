<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-PTW LRT Jakarta - Real-Time Dashboard, Document Center & QR Scanner</title>
  
  <!-- Tailwind CSS -->

  <!-- FontAwesome Icons -->

  <!-- React & Babel -->

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, button, input, select, textarea, table {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .custom-leaflet-icon-wrapper {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 24px !important;
      height: 24px !important;
      background: transparent !important;
      border: none !important;
    }

    @keyframes yellow-sonar {
      0% {
        transform: scale(0.9) translateZ(0);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.8);
      }
      70% {
        transform: scale(1.3) translateZ(0);
        opacity: 0.4;
        box-shadow: 0 0 0 16px rgba(234, 179, 8, 0);
      }
      100% {
        transform: scale(0.9) translateZ(0);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(234, 179, 8, 0);
      }
    }
    
    .marker-active-radar {
      width: 18px;
      height: 18px;
      background-color: #eab308;
      border: 3px solid #ffffff;
      border-radius: 50%;
      display: block;
      will-change: transform, box-shadow, opacity;
      transform: transform-gpu;
      animation: yellow-sonar 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
      box-shadow: 0 2px 10px rgba(234,179,8,0.5);
    }

    .marker-standby-green {
      width: 18px;
      height: 18px;
      background-color: #22c55e;
      border: 3px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 3px 8px rgba(34,197,94,0.4);
      display: block;
    }

    .marker-inactive-solid {
      width: 14px;
      height: 14px;
      background-color: #64748b;
      border: 2px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
      display: block;
    }

    @keyframes blue-sonar {
      0% {
        transform: scale(0.9) translateZ(0);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.8);
      }
      70% {
        transform: scale(1.4) translateZ(0);
        opacity: 0.3;
        box-shadow: 0 0 0 16px rgba(59, 130, 246, 0);
      }
      100% {
        transform: scale(0.9) translateZ(0);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }
    .marker-user-satpam {
      width: 20px;
      height: 20px;
      background-color: #3b82f6;
      border: 3px solid #ffffff;
      border-radius: 50%;
      display: block;
      will-change: transform, box-shadow, opacity;
      transform: transform-gpu;
      animation: blue-sonar 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
      box-shadow: 0 3px 12px rgba(59, 130, 246, 0.6);
    }

    @keyframes indigo-sonar {
      0% {
        transform: scale(0.9) translateZ(0);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.8);
      }
      70% {
        transform: scale(1.4) translateZ(0);
        opacity: 0.3;
        box-shadow: 0 0 0 16px rgba(99, 102, 241, 0);
      }
      100% {
        transform: scale(0.9) translateZ(0);
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
      }
    }
    .marker-user-karyawan {
      width: 20px;
      height: 20px;
      background-color: #6366f1;
      border: 3px solid #ffffff;
      border-radius: 50%;
      display: block;
      will-change: transform, box-shadow, opacity;
      transform: transform-gpu;
      animation: indigo-sonar 1.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
      box-shadow: 0 3px 12px rgba(99, 102, 241, 0.6);
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.3);
      border-radius: 10px;
    }

    @media print {
      body {
        background: white !important;
        color: black !important;
      }
      .no-print {
        display: none !important;
      }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-red-200">

  <!-- Main Mount Root -->
  <div id="root"></div>

  <script type="text/babel">
  const { useState, useEffect, useRef, useMemo } = React;

  // =========================================================================
  // KONFIGURASI LINK DEPLOY GOOGLE APPS SCRIPT WEB APP (DARI GITHUB / GAS)
  // Tempel link deploy macro web app Anda di sini
  // =========================================================================
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoyzFmncS1vFPDWWZssXxUwIJXehDsOq-11YmIL6S94yHcKwRSPrk8H7z6oExVbR2yNw/exec"; 

  const FALLBACK_STASIUN = [
    { id: "Depo MCC", nama: "Depo MCC LRT Jakarta", lat: -6.15673058867278, lng: 106.91530773721628 },
    { id: "Stasiun Pegangsaan Dua", nama: "Stasiun Pegangsaan Dua", lat: -6.157045654568884, lng: 106.9141988717374 },
    { id: "Stasiun Boulevard Utara", nama: "Stasiun Boulevard Utara", lat: -6.1590419542791714, lng: 106.90609745256225 },
    { id: "Stasiun Boulevard Selatan", nama: "Stasiun Boulevard Selatan", lat: -6.168777159603347, lng: 106.900048839072 },
    { id: "Stasiun Pulomas", nama: "Stasiun Pulomas", lat: -6.177055996387905, lng: 106.89333635070712 },
    { id: "Stasiun Equestrian", nama: "Stasiun Equestrian", lat: -6.183455332678751, lng: 106.89124707954375 },
    { id: "Stasiun Velodrome", nama: "Stasiun Velodrome", lat: -6.192267299730681, lng: 106.89116365423847 }
  ];

  const parseCoordinate = (val) => {
    if (val === undefined || val === null || val === "") return NaN;
    const cleanStr = String(val).replace(/,/g, '.').replace(/\s/g, '');
    return parseFloat(cleanStr);
  };

  const executeGasFetch = async (action, bodyPayload = {}) => {
    if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("1dsgwTqbrGW6d1q5ikguEwQToX5nLP5dozoyFcFDoNXo")) {
      throw new Error("Pemberitahuan: Silakan pasang Web App URL yang valid di variabel GAS_WEB_APP_URL.");
    }
    const response = await fetch(GAS_WEB_APP_URL, {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({ action, ...bodyPayload })
    });
    const result = await response.json();
    if (!result.success) {
      throw new Error(result.error || "Gagal memproses permintaan API");
    }
    return result.data;
  };

  function App() {
    const isGasContainer = typeof google !== 'undefined' && google.script && google.script.run;
    const hasExternalApi = GAS_WEB_APP_URL && !GAS_WEB_APP_URL.includes("1dsgwTqbrGW6d1q5ikguEwQToX5nLP5dozoyFcFDoNXo");

    const [isLoggedIn, setIsLoggedIn] = useState(false);
    const [role, setRole] = useState("satpam"); // "satpam", "karyawan", atau "vendor"
    const [currentUser, setCurrentUser] = useState(null);
    const [loginEmail, setLoginEmail] = useState("");
    const [loginPassword, setLoginPassword] = useState("");
    const [loginError, setLoginError] = useState("");
    const [isLoggingIn, setIsLoggingIn] = useState(false);

    // Registrasi Vendor States
    const [isRegisterMode, setIsRegisterMode] = useState(false);
    const [regNamaUser, setRegNamaUser] = useState("");
    const [regNamaPerusahaan, setRegNamaPerusahaan] = useState("");
    const [regEmail, setRegEmail] = useState("");
    const [regPassword, setRegPassword] = useState("");
    const [regConfirmPassword, setRegConfirmPassword] = useState("");
    const [regError, setRegError] = useState("");
    const [isRegistering, setIsRegistering] = useState(false);
    
    const [muted, setMuted] = useState(false);
    const [realTimeClock, setRealTimeClock] = useState(new Date());

    const [ptwDB, setPtwDB] = useState([]);
    const [listLokasiTugas, setListLokasiTugas] = useState(FALLBACK_STASIUN);
    const [currentTab, setCurrentTab] = useState("dashboard");

    const [searchQuery, setSearchQuery] = useState("");
    const [statusFilter, setStatusFilter] = useState("Semua");

    const [ptwStationStates, setPtwStationStates] = useState(() => {
      try {
        const saved = localStorage.getItem("ptw_station_states_v2");
        return saved ? JSON.parse(saved) : {};
      } catch (e) {
        return {};
      }
    });

    const [userCoords, setUserCoords] = useState(null);
    const hasCenteredOnUserRef = useRef(false);
    
    const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
    const [notificationMsg, setNotificationMsg] = useState("");
    const [actionQueue, setActionQueue] = useState([]);
    const [showActionPopup, setShowActionPopup] = useState(false);
    const [previewPdfPtw, setPreviewPdfPtw] = useState(null);
    const [vendorSuccessSubmit, setVendorSuccessSubmit] = useState(null);

    // QR SCANNING STATES (For Satpam Camera QR Scanning)
    const [isQrScannerOpen, setIsQrScannerOpen] = useState(false);
    const [scannedResult, setScannedResult] = useState(null);
    const [manualPtwIdInput, setManualPtwIdInput] = useState("");
    const [scanErrorMsg, setScanErrorMsg] = useState("");
    const html5QrCodeRef = useRef(null);

    // Form states
    const [formPtwNo, setFormPtwNo] = useState("");
    const [formJsaNo, setFormJsaNo] = useState("");
    const [formVendor, setFormVendor] = useState("");
    const [formPenanggungJawab, setFormPenanggungJawab] = useState("");
    const [formShePelaksana, setFormShePelaksana] = useState("");
    const [formPemberiKerja, setFormPemberiKerja] = useState("");
    const [formPengawasPemberiKerja, setFormPengawasPemberiKerja] = useState("");
    
    const [formPekerjaan, setFormPekerjaan] = useState("");
    const [formLokasi, setFormLokasi] = useState([]);
    const [formTglMulai, setFormTglMulai] = useState("");
    const [formJamMulai, setFormJamMulai] = useState("");
    const [formTglSelesai, setFormTglSelesai] = useState("");
    const [formJamSelesai, setFormJamSelesai] = useState("");
    const [formPekerjaCount, setFormPekerjaCount] = useState(2);
    const [formPersonelList, setFormPersonelList] = useState("");

    const [formPotensiApi, setFormPotensiApi] = useState("Tidak");
    const [formApdList, setFormApdList] = useState({
      "Safety Helmet": true, "Safety Vest": true, "Safety Shoes": true, "Ear Muff": false,
      "Ear Plug": false, "Hair Protection": false, "Face Protector": false, "Welding Mask": false,
      "Apron": false, "Welding Clothes": false, "Protective Clothing": false, "Leather Gloves": false,
      "Gas Mask": false, "Dust Mask": false, "Breathing Apparatus": false, "Nitrile Gloves": false,
      "Cotton Gloves": false, "Full Body Harness": false, "Goggles": false, "Safety Glasses": false,
      "Lain-lain": ""
    });

    const [formIsolasiBahanKimia, setFormIsolasiBahanKimia] = useState("Tidak");
    const [formIsolasiMsds, setFormIsolasiMsds] = useState("Tidak");

    const [formLotoProsedur, setFormLotoProsedur] = useState("Tidak");
    const [formLotoListrik, setFormLotoListrik] = useState("Tidak");
    const [formLotoMekanis, setFormLotoMekanis] = useState("Tidak");
    const [formLotoHidrolik, setFormLotoHidrolik] = useState("Tidak");

    const mapInstanceRef = useRef(null);
    const markersGroupRef = useRef([]);
    const chartPekerjaRef = useRef(null);
    const chartStatusRef = useRef(null);
    const audioContextRef = useRef(null);
    const alarmIntervalRef = useRef(null);

    // Simpan local state tracker stasiun ke localstorage
    useEffect(() => {
      try {
        localStorage.setItem("ptw_station_states_v2", JSON.stringify(ptwStationStates));
      } catch (e) {
        console.error("Gagal menyimpan ke localStorage:", e);
      }
    }, [ptwStationStates]);

    // GPS Geolocation Engine
    useEffect(() => {
      if (!isLoggedIn) {
        setUserCoords(null);
        hasCenteredOnUserRef.current = false;
        return;
      }

      let watchId = null;
      if (navigator.geolocation) {
        showToast("Mencari titik koordinat GPS presisi Anda...");
        watchId = navigator.geolocation.watchPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            setUserCoords({ lat, lng });

            if (mapInstanceRef.current && !hasCenteredOnUserRef.current) {
              mapInstanceRef.current.setView([lat, lng], 14);
              hasCenteredOnUserRef.current = true;
              showToast("Peta diselaraskan ke GPS lokasi Anda.");
            }
          },
          (error) => {
            console.warn("Akses GPS Ditolak / Time out:", error);
            showToast("Titik GPS menggunakan simulasi.");
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      }
      return () => {
        if (watchId !== null && navigator.geolocation) {
          navigator.geolocation.clearWatch(watchId);
        }
      };
    }, [isLoggedIn]);

    // Menyelesaikan workflow status per-stasiun untuk Izin
    const getStationStatusForPtw = (ptw, stasiunId) => {
      const normalizedStasiun = stasiunId.toLowerCase().trim();
      const isExpired = ptw.status === "Expired";
      if (isExpired) return "Expired";

      const localState = ptwStationStates[ptw.id];
      if (localState) {
        const isCompleted = localState.completed.some(loc => loc.toLowerCase().trim() === normalizedStasiun);
        if (isCompleted) return "Expired"; 

        const isVerified = localState.verified.some(loc => loc.toLowerCase().trim() === normalizedStasiun);
        if (isVerified) return "Work In Progress"; 

        if (ptw.status === "Work In Progress" || ptw.status === "Awaiting Satpam Verification") {
          return "Awaiting Satpam Verification"; 
        }
      } else {
        if (ptw.status === "Work In Progress") {
          const isFirst = ptw.lokasi[0] && ptw.lokasi[0].toLowerCase().trim() === normalizedStasiun;
          return isFirst ? "Work In Progress" : "Awaiting Satpam Verification";
        }
      }
      return ptw.status; 
    };

    const getPtwStatusForUser = (ptw) => {
      if (role === "karyawan" || role === "vendor") return ptw.status;
      const userLocation = currentUser?.["Lokasi Tugas"];
      if (!userLocation) return ptw.status;
      return getStationStatusForPtw(ptw, userLocation);
    };

    // Auto-Expiry & Realtime Clock Engine
    useEffect(() => {
      const timer = setInterval(() => {
        const now = new Date();
        setRealTimeClock(now);
        
        setPtwDB(prevDB => {
          let changed = false;
          const updated = prevDB.map(ptw => {
            if (ptw.status === "Work In Progress" || ptw.status === "Awaiting Satpam Verification") {
              const expireDateStr = `${ptw.tanggalSelesai}T${ptw.jamSelesai}:00`;
              const endDateTime = new Date(expireDateStr);
              if (now > endDateTime) {
                changed = true;
                return { ...ptw, status: "Expired" };
              }
            }
            return ptw;
          });
          return changed ? updated : prevDB;
        });
      }, 1000);

      return () => clearInterval(timer);
    }, []);

    const processDatabaseResponse = (data) => {
      if (data) {
        if (data.ptw) {
          const parsedPTWs = data.ptw.filter(Boolean).map(p => ({
            id: p["ID PTW"] || p["id"] || "PTW-UNKNOWN",
            ptwNo: p["Permit To Work No"] || p["ptwNo"] || `PTW/LRTJ/${Math.floor(100 + Math.random() * 900)}/2026`,
            jsaNo: p["JSA No"] || p["jsaNo"] || `JSA/LRTJ/${Math.floor(100 + Math.random() * 900)}/2026`,
            vendor: p["Nama Perusahaan"] || p["vendor"] || "Kontraktor Tanpa Nama",
            penanggungJawab: p["Penanggung Jawab"] || p["penanggungJawab"] || "Erwin Martoras",
            shePelaksana: p["SHE Pelaksana"] || p["shePelaksana"] || "Disma Krisntanto S.",
            pemberiKerja: p["Pemberi Kerja"] || p["pemberiKerja"] || "Muhammad fajar Mahendra",
            pengawasPemberiKerja: p["Pengawas Pemberi Kerja"] || p["pengawasPemberiKerja"] || "Deni Yusfiardi",
            personelList: p["Personel List"] || p["personelList"] || "Ginanjar, Jajang, Muarip, Agles, Gangsar",
            jenisPekerjaan: p["Jenis Pekerjaan"] || p["jenisPekerjaan"] || "Pekerjaan Umum",
            lokasi: String(p["Lokasi Bekerja"] || p["lokasi"] || "").split(",").map(x => x.trim()).filter(Boolean),
            tanggalMulai: p["Tanggal Pengajuan"] || p["tanggalMulai"] || "",
            jamMulai: p["Jam Mulai Pekerjaan"] || p["jamMulai"] || "00:00",
            tanggalSelesai: p["Tanggal Expired"] || p["tanggalSelesai"] || "",
            jamSelesai: p["Jam Selesai Pekerjaan"] || p["jamSelesai"] || "23:59",
            jumlahPekerja: parseInt(p["Jumlah Pekerja"] || p["jumlahPekerja"]) || 2,
            status: p["Status"] || p["status"] || "Pending",
            latGps: parseCoordinate(p["Lat Gps"] || p["latGps"]),
            lngGps: parseCoordinate(p["Lng Gps"] || p["lngGps"]),
            potensiApi: p["Potensi Api"] || "Tidak",
            apdList: p["Apd List"] ? JSON.parse(p["Apd List"]) : { "Safety Helmet": true, "Safety Vest": true, "Safety Shoes": true },
            isolasiBahanKimia: p["Isolasi Bahan Kimia"] || "Tidak",
            isolasiMsds: p["Isolasi MSDS"] || "Tidak",
            lotoProsedur: p["LOTO Prosedur"] || "Tidak",
            lotoListrik: p["LOTO Listrik"] || "Tidak",
            lotoMekanis: p["LOTO Mekanis"] || "Tidak",
            lotoHidrolik: p["LOTO Hidrolik"] || "Tidak"
          }));
          setPtwDB(parsedPTWs);
        }

        let updatedStations = [...FALLBACK_STASIUN];
        if (data.satpam && data.satpam.length > 0) {
          data.satpam.forEach(row => {
            if (!row) return;
            const stationId = row["Lokasi Tugas"] ? String(row["Lokasi Tugas"]).trim() : "";
            const latVal = parseCoordinate(row["Lat GPS"] || row["Lat Gps"] || row["Latitude"]);
            const lngVal = parseCoordinate(row["Lng Kordinat"] || row["Lng Koordinat"] || row["Longitude"]);

            if (stationId && !isNaN(latVal) && !isNaN(lngVal)) {
              const existingIdx = updatedStations.findIndex(st => 
                st.id.toLowerCase().trim() === stationId.toLowerCase().trim()
              );
              if (existingIdx > -1) {
                updatedStations[existingIdx] = { ...updatedStations[existingIdx], lat: latVal, lng: lngVal };
              } else {
                updatedStations.push({ id: stationId, nama: stationId, lat: latVal, lng: lngVal });
              }
            }
          });
        }
        setListLokasiTugas(updatedStations);
      }
    };

    const fetchDataFromSheet = () => {
      if (isGasContainer) {
        google.script.run
          .withSuccessHandler(processDatabaseResponse)
          .withFailureHandler((err) => {
            showToast("Koneksi gagal: " + err.message);
          })
          .getDatabaseData();
      } else if (hasExternalApi) {
        fetch(`${GAS_WEB_APP_URL}?action=getDatabaseData`)
          .then(res => res.json())
          .then(res => {
            if (res.success && res.data) {
              processDatabaseResponse(res.data);
            } else {
              showToast("API Error: " + res.error);
            }
          })
          .catch(err => {
            console.error("Gagal memuat API:", err);
            showToast("Gagal memuat data dari Web App GAS.");
          });
      } else {
        const dummyHistory = [
          {
            id: "PTW-832912",
            ptwNo: "832/PTW/LRTJ/D/2026-1",
            jsaNo: "JSA/LRTJ/VND/2026-12",
            vendor: "PT Waskita - Nindya - LRS KSO",
            penanggungJawab: "Erwin Martoras",
            shePelaksana: "Disma Krisntanto S.",
            pemberiKerja: "Muhammad fajar Mahendra",
            pengawasPemberiKerja: "Deni Yusfiardi",
            personelList: "Ginanjar, Jajang, Muarip, Agles, Gangsar",
            jenisPekerjaan: "* Mobilisasi perangkat Upgrade Walldisplay (Server room Lt.6 MCC)\n* Pengetesan ulang autorecloser TPSS Velodrome",
            lokasi: ["Depo MCC", "Stasiun Pegangsaan Dua", "Stasiun Velodrome"],
            tanggalMulai: "2026-07-12",
            jamMulai: "23:00",
            tanggalSelesai: "2026-07-28",
            jamSelesai: "04:00",
            jumlahPekerja: 29,
            status: "Work In Progress",
            latGps: -6.15673058867278,
            lngGps: 106.91530773721628,
            potensiApi: "Ada",
            apdList: { "Safety Helmet": true, "Safety Vest": true, "Safety Shoes": true, "Dust Mask": true },
            isolasiBahanKimia: "Tidak",
            isolasiMsds: "Tidak",
            lotoProsedur: "Tidak",
            lotoListrik: "Tidak",
            lotoMekanis: "Tidak",
            lotoHidrolik: "Ya"
          }
        ];
        setPtwDB(dummyHistory);
      }
    };

    useEffect(() => {
      if (isLoggedIn) {
        fetchDataFromSheet();
        const autoSync = setInterval(fetchDataFromSheet, 12000);
        return () => clearInterval(autoSync);
      }
    }, [isLoggedIn]);

    // Logika pencarian dan penyaringan filter

      if (muted) return;
      try {
        if (!audioContextRef.current) {
          audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        const ctx = audioContextRef.current;
        if (ctx.state === "suspended") ctx.resume();

        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gainNode = ctx.createGain();

        osc1.type = "sine";
        osc1.frequency.setValueAtTime(880, ctx.currentTime); 
        osc2.type = "triangle";
        osc2.frequency.setValueAtTime(440, ctx.currentTime); 

        gainNode.gain.setValueAtTime(0.12, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

        osc1.connect(gainNode);
        osc2.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc1.start();
        osc2.start();
        osc1.stop(ctx.currentTime + 1.3);
        osc2.stop(ctx.currentTime + 1.3);
      } catch (e) {
        console.warn("Audio Synth fail:", e);

        const popupContent = `

            <h4 class="font-bold text-xs border-b pb-1 mb-1 text-slate-900">${stasiun.nama}</h4>

              <ul class="list-disc pl-3 text-slate-700">

              </ul>
            </div>
          </div>
        `;

        const marker = L.marker([lat, lng], { icon: customIcon })
          .addTo(map)
          .bindPopup(popupContent);

        markersGroupRef.current.push(marker);
      });

      if (userCoords && !isNaN(userCoords.lat) && !isNaN(userCoords.lng)) {
        const userIconClass = role === "satpam" ? "marker-user-satpam" : "marker-user-karyawan";

          html: `<div class="${userIconClass}"></div>`,

    // Grafik aktivitas Vendor 7 hari ke belakang

      const last7Days = [];
      for (let i = 6; i >= 0; i--) {

      const vendorActivitiesCount = last7Days.map(dateStr => {
        return visiblePtwDB.filter(ptw => {
          const resolvedStatus = getPtwStatusForUser(ptw);

          const start = ptw.tanggalMulai;
          const end = ptw.tanggalSelesai || ptw.tanggalMulai;
          return dateStr >= start && dateStr <= end;

              backgroundColor: ['rgba(234,179,8,0.85)', 'rgba(34,197,94,0.85)', 'rgba(148,163,184,0.5)'],
              borderColor: ['rgb(202,138,4)', 'rgb(22,163,74)', 'rgb(100,116,139)'],
              borderWidth: 1,

          options: {
            responsive: true,
            maintainAspectRatio: false,

    const wipCount = visiblePtwDB.filter(p => getPtwStatusForUser(p) === "Work In Progress").length;

    const formatIndonesianClock = (dateObj) => {
      const weekdays = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
      const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
      
      const dayName = weekdays[dateObj.getDay()];
      const day = dateObj.getDate();
      const monthName = months[dateObj.getMonth()];
      const year = dateObj.getFullYear();
      const hh = String(dateObj.getHours()).padStart(2, '0');
      const mm = String(dateObj.getMinutes()).padStart(2, '0');
      const ss = String(dateObj.getSeconds()).padStart(2, '0');

      return `${dayName}, ${day} ${monthName} ${year} — ${hh}:${mm}:${ss} WIB`;

          scanner.render((decodedText) => {

          setScanErrorMsg("Gagal mengakses kamera. Silakan gunakan input manual di bawah.");
        }

                        <input type="date" required className="w-full p-2 bg-slate-50 rounded border border-slate-300 font-bold text-slate-900 focus:ring-1 focus:ring-red-600" value={formTglSelesai} onChange={(e) => setFormTglSelesai(e.target.value)}/>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block font-bold text-slate-500 mb-1">Mulai Jam</label>
                        <input type="time" required className="w-full p-2 bg-slate-50 rounded border border-slate-300 font-mono font-bold text-slate-900 focus:ring-1 focus:ring-red-600" value={formJamMulai} onChange={(e) => setFormJamMulai(e.target.value)}/>
                      </div>
                      <div>
                        <label className="block font-bold text-slate-500 mb-1">Selesai Jam</label>
                        <input type="time" required className="w-full p-2 bg-slate-50 rounded border border-slate-300 font-mono font-bold text-slate-900 focus:ring-1 focus:ring-red-600" value={formJamSelesai} onChange={(e) => setFormJamSelesai(e.target.value)}/>
                      </div>
                    </div>
                  </div>
                </div>

                <div>
                  <label className="block font-bold text-slate-500 uppercase mb-1">Uraian / Deskripsi Pekerjaan</label>
                  <textarea 
                    rows="3" 
                    required 
                    className="w-full p-2.5 rounded-lg border border-slate-300 bg-white text-slate-900 outline-none focus:ring-1 focus:ring-red-600"
                    value={formPekerjaan}
                    onChange={(e) => setFormPekerjaan(e.target.value)}
                  />
                </div>

                <div className="p-4 rounded-xl border border-slate-200 bg-white shadow-sm space-y-4">
                  <h4 className="font-black text-blue-600 border-b border-slate-200 pb-1.5 uppercase">KOLOM D: ALAT BANTU & APD MANDATORY</h4>
                  
                  <div className="flex items-center space-x-6 bg-slate-50 p-2.5 rounded border border-slate-200">
                    <span className="font-extrabold text-slate-700">1. Potensi Api Terbuka:</span>
                    <label className="flex items-center space-x-1 cursor-pointer">
                      <input type="radio" name="potensiApi" value="Ada" checked={formPotensiApi === "Ada"} onChange={() => setFormPotensiApi("Ada")} className="w-4 h-4 text-red-600"/>
                      <span className="font-bold text-red-600 font-sans">Ada Api</span>
                    </label>
                    <label className="flex items-center space-x-1 cursor-pointer">
                      <input type="radio" name="potensiApi" value="Tidak" checked={formPotensiApi === "Tidak"} onChange={() => setFormPotensiApi("Tidak")} className="w-4 h-4 text-slate-600"/>
                      <span className="font-bold text-slate-600 font-sans">Tidak Ada</span>
                    </label>
                  </div>

                  <div>
                    <span className="font-extrabold text-slate-700 block mb-2">2. Alat Pelindung Diri (APD):</span>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 bg-slate-50 p-3 rounded-lg border border-slate-200 font-sans">
                      {Object.keys(formApdList).map((apd) => {
                        if (apd === "Lain-lain") return null;
                        return (
                          <label key={apd} className="flex items-center space-x-2 cursor-pointer hover:bg-slate-200 p-1 rounded">
                            <input 
                              type="checkbox" 
                              checked={formApdList[apd]} 
                              onChange={(e) => setFormApdList({ ...formApdList, [apd]: e.target.checked })}
                              className="rounded text-blue-600 w-4 h-4"
                            />
                            <span className="text-[11px] font-semibold text-slate-700">{apd}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4 font-sans text-xs">
                    <div className="bg-slate-50 p-3 rounded border border-slate-200 space-y-2">
                      <span className="font-bold text-slate-700 block">3. Penanganan Isolasi & MSDS:</span>
                      <div className="flex justify-between items-center text-[11px]">
                        <span>Bahan kimia berbahaya?</span>
                        <div className="flex space-x-2">
                          <button type="button" onClick={() => setFormIsolasiBahanKimia("Ya")} className={`px-2 py-1 rounded font-bold ${formIsolasiBahanKimia === "Ya" ? "bg-red-600 text-white" : "bg-slate-200 text-slate-600"}`}>Ya</button>
                          <button type="button" onClick={() => setFormIsolasiBahanKimia("Tidak")} className={`px-2 py-1 rounded font-bold ${formIsolasiBahanKimia === "Tidak" ? "bg-red-600 text-white" : "bg-slate-200 text-slate-600"}`}>Tidak</button>
                        </div>
                      </div>
                      <div className="flex justify-between items-center text-[11px]">
                        <span>Melampirkan MSDS?</span>
                        <div className="flex space-x-2">
                          <button type="button" onClick={() => setFormIsolasiMsds("Ya")} className={`px-2 py-1 rounded font-bold ${formIsolasiMsds === "Ya" ? "bg-red-600 text-white" : "bg-slate-200 text-slate-600"}`}>Ya</button>
                          <button type="button" onClick={() => setFormIsolasiMsds("Tidak")} className={`px-2 py-1 rounded font-bold ${formIsolasiMsds === "Tidak" ? "bg-red-600 text-white" : "bg-slate-200 text-slate-600"}`}>Tidak</button>
                        </div>
                      </div>
                    </div>

                    <div className="bg-slate-50 p-3 rounded border border-slate-200 space-y-2">
                      <span className="font-bold text-slate-700 block">4. Prosedur LOTO:</span>
                      <div className="grid grid-cols-2 gap-1.5 text-[10px]">
                        <div className="flex justify-between items-center">
                          <span>Perlu LOTO?</span>
                          <button type="button" onClick={() => setFormLotoProsedur(formLotoProsedur === "Ya" ? "Tidak" : "Ya")} className={`px-2 py-0.5 rounded font-black ${formLotoProsedur === "Ya" ? "bg-blue-600 text-white" : "bg-slate-200 text-slate-600"}`}>{formLotoProsedur}</button>
                        </div>
                        <div className="flex justify-between items-center">
                          <span>Listrik?</span>
                          <button type="button" onClick={() => setFormLotoListrik(formLotoListrik === "Ya" ? "Tidak" : "Ya")} className={`px-2 py-0.5 rounded font-black ${formLotoListrik === "Ya" ? "bg-blue-600 text-white" : "bg-slate-200 text-slate-600"}`}>{formLotoListrik}</button>
                        </div>
                        <div className="flex justify-between items-center">
                          <span>Mekanis?</span>
                          <button type="button" onClick={() => setFormLotoMekanis(formLotoMekanis === "Ya" ? "Tidak" : "Ya")} className={`px-2 py-0.5 rounded font-black ${formLotoMekanis === "Ya" ? "bg-blue-600 text-white" : "bg-slate-200 text-slate-600"}`}>{formLotoMekanis}</button>
                        </div>
                        <div className="flex justify-between items-center">
                          <span>Hidrolik?</span>
                          <button type="button" onClick={() => setFormLotoHidrolik(formLotoHidrolik === "Ya" ? "Tidak" : "Ya")} className={`px-2 py-0.5 rounded font-black ${formLotoHidrolik === "Ya" ? "bg-blue-600 text-white" : "bg-slate-200 text-slate-600"}`}>{formLotoHidrolik}</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="flex justify-end gap-2 border-t border-slate-200 pt-4 font-sans">
                  <button 
                    type="button"
                    onClick={() => setIsCreateModalOpen(false)}
                    className="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-lg transition"
                  >
                    Batal
                  </button>
                  <button 
                    type="submit"
                    className="px-5 py-2 bg-red-600 hover:bg-red-700 text-white font-black rounded-lg transition shadow-md shadow-red-600/10"
                  >
                    Kirim Form K3 PTW
                  </button>
                </div>
              </form>
            </div>
          </div>
        )}

        {/* MODAL: PRATINJAU DOKUMEN & PDF GENERATION */}
        {previewPdfPtw && (
          <div className="fixed inset-0 z-[1000] bg-slate-900/60 backdrop-blur-md flex flex-col p-4 overflow-y-auto font-serif">
            <div className="w-full max-w-4xl mx-auto bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-2xl flex flex-col my-4">
              <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-100 text-slate-800 font-sans">
                <div className="flex items-center space-x-2">
                  <i className="fa-solid fa-file-pdf text-red-600 text-lg"></i>
                  <span className="font-extrabold text-sm uppercase">Pratinjau Lembar PTW K3</span>
                </div>
                <div className="flex items-center space-x-2">
                  <button 
                    onClick={() => handleDownloadPdf(previewPdfPtw)}
                    className="px-4 py-1.5 bg-red-600 hover:bg-red-700 text-white font-black rounded-xl text-xs transition flex items-center space-x-1"
                  >
                    <i className="fa-solid fa-cloud-arrow-down"></i>
                    <span>Download PDF</span>
                  </button>
                  <button onClick={() => setPreviewPdfPtw(null)} className="p-1 hover:bg-slate-200 rounded-lg text-slate-500">
                    <i className="fa-solid fa-xmark text-lg"></i>
                  </button>
                </div>
              </div>

              <div className="p-8 bg-white text-slate-900 overflow-x-auto">
                <div id="pdf-render-target" className="w-[190mm] mx-auto p-4 bg-white text-slate-900 text-[10px] font-serif border-2 border-slate-900">
                  
                  {/* Master Header Block */}
                  <div className="border-2 border-slate-950 p-2 flex justify-between items-center bg-white">
                    <div className="flex items-center space-x-2">
                      <div className="font-black text-base text-red-600 tracking-tight flex flex-col leading-none">
                        <span className="text-sm font-bold text-slate-800">LRT JAKARTA</span>
                        <span className="text-[10px] text-red-600 font-extrabold">DEPT. K3 HSE DIVISION</span>
                      </div>
                    </div>
                    <div className="border-l-2 border-slate-950 pl-4 text-right">
                      <table className="w-full text-left font-mono text-[8px] leading-tight text-slate-800">
                        <tbody>
                          <tr><td>Nomor Dokumen:</td><td className="pl-2 font-bold">LRTJ-FR-MKL-003</td></tr>
                          <tr><td>Tanggal Efektif:</td><td className="pl-2">2022-09-06</td></tr>
                          <tr><td>ID Berkas:</td><td className="pl-2 text-red-600 font-bold">{previewPdfPtw.id}</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="border-x-2 border-b-2 border-slate-950 p-3 grid grid-cols-2 gap-4 bg-white">
                    <div>
                      <p><strong>Permit To Work No.:</strong> {previewPdfPtw.ptwNo}</p>
                    </div>
                    <div>
                      <p><strong>JSA No.:</strong> {previewPdfPtw.jsaNo}</p>
                    </div>
                  </div>

                  <div className="border-x-2 border-b-2 border-slate-950 p-3 grid grid-cols-2 gap-4 bg-white">
                    <div className="space-y-1">
                      <p><strong>Nama Instansi / Perusahaan:</strong> {previewPdfPtw.vendor}</p>
                      <p><strong>Penanggung Jawab Pelaksana:</strong> {previewPdfPtw.penanggungJawab}</p>
                      <p><strong>SHE Pelaksana:</strong> {previewPdfPtw.shePelaksana}</p>
                      <p><strong>Pemberi Kerja:</strong> {previewPdfPtw.pemberiKerja}</p>
                    </div>
                    <div className="space-y-1">
                      <p><strong>Lokasi Bekerja:</strong> {previewPdfPtw.lokasi.join(", ")}</p>
                      <p><strong>Pengawas Pemberi Kerja:</strong> {previewPdfPtw.pengawasPemberiKerja}</p>
                      <p><strong>Jumlah Personel:</strong> {previewPdfPtw.jumlahPekerja} Orang</p>
                      <p><strong>Nama Personel Pelaksana:</strong> {previewPdfPtw.personelList || "-"}</p>
                    </div>
                  </div>

                  <div className="border-x-2 border-b-2 border-slate-950 p-2 text-center font-bold bg-slate-100 uppercase tracking-tight text-[9px] grid grid-cols-3 divide-x-2 divide-slate-950">
                    <div>Izin Terbatas :</div>
                    <div>Tanggal: {previewPdfPtw.tanggalMulai} s/d {previewPdfPtw.tanggalSelesai}</div>
                    <div>Jam Operasional: {previewPdfPtw.jamMulai} s/d {previewPdfPtw.jamSelesai}</div>
                  </div>

                  <div className="border-x-2 border-b-2 border-slate-950 p-3 bg-white">
                    <p className="font-bold uppercase mb-1">Uraian Pekerjaan:</p>
                    <p className="text-slate-800 text-[9px] leading-relaxed italic">{previewPdfPtw.jenisPekerjaan}</p>
                  </div>

                  <div className="border-x-2 border-b-2 border-slate-950 p-3 space-y-3 bg-white">
                    <p className="font-bold uppercase">Perlengkapan / APD Mandatory:</p>
                    
                    <div>
                      <p className="font-semibold mb-1">1. Potensi Api Terbuka:</p>
                      <span className="mr-4"> [ {previewPdfPtw.potensiApi === "Ada" ? "✔" : " "} ] Ada</span>
                      <span> [ {previewPdfPtw.potensiApi === "Tidak" ? "✔" : " "} ] Tidak</span>
                    </div>

                    <div>
                      <p className="font-semibold mb-1">2. Alat Pelindung Diri (APD):</p>
                      <div className="grid grid-cols-3 gap-y-1 text-[8px]">
                        {Object.keys(previewPdfPtw.apdList || {}).map(apd => (
                          <div key={apd}>
                            <span> [ {previewPdfPtw.apdList[apd] ? "✔" : " "} ] {apd}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 pt-2 border-t border-slate-200 font-sans">
                      <div>
                        <p className="font-semibold mb-1 font-serif">3. Perlengkapan Isolasi:</p>
                        <p>Bahan Kimia? <strong>{previewPdfPtw.isolasiBahanKimia}</strong></p>
                        <p>Salinan MSDS? <strong>{previewPdfPtw.isolasiMsds}</strong></p>
                      </div>
                      <div>
                        <p className="font-semibold mb-1 font-serif">4. Prosedur LOTO:</p>
                        <p>Prosedur LOTO: <strong>{previewPdfPtw.lotoProsedur}</strong> | Listrik: <strong>{previewPdfPtw.lotoListrik}</strong></p>
                        <p>Mekanis: <strong>{previewPdfPtw.lotoMekanis}</strong> | Hidrolik: <strong>{previewPdfPtw.lotoHidrolik}</strong></p>
                      </div>
                    </div>
                  </div>

                  {/* Signatures */}
                  <div className="border-x-2 border-b-2 border-slate-950 p-3 grid grid-cols-3 gap-2 text-center text-[8px] font-mono bg-white">
                    <div>
                      <p>Diajukan Oleh,</p>
                      <div className="h-10"></div>
                      <p className="underline font-bold text-slate-900">{previewPdfPtw.penanggungJawab}</p>
                      <p>Danru / Pengawas Lapangan</p>
                    </div>
                    <div>
                      <p>Verifikasi Lapangan,</p>
                      <div className="h-10 text-emerald-600 font-bold flex items-center justify-center">VERIFIED</div>
                      <p className="underline font-bold text-slate-900">Bambang Hariyanto</p>
                      <p>Sektor Satpam LRTJ</p>
                    </div>
                    <div>
                      <p>Disetujui Oleh,</p>
                      <div className="h-10 text-emerald-600 font-bold flex items-center justify-center">APPROVED BY HSE</div>
                      <p className="underline font-bold text-slate-900">Dewi Lestari, S.T.</p>
                      <p>Karyawan HSE Specialist</p>
                    </div>
                  </div>

                </div>
              </div>
            </div>
          </div>
        )}

        {/* MODIFIED: NEW MODAL QR SCANNER FOR SATPAM */}
        {isQrScannerOpen && (
          <div className="fixed inset-0 z-[1100] bg-slate-950/70 backdrop-blur-md flex items-center justify-center p-4">
            <div className="w-full max-w-lg bg-white rounded-2xl overflow-hidden shadow-2xl border border-slate-200 flex flex-col">
              
              <div className="p-4 bg-slate-900 text-white flex justify-between items-center">
                <div className="flex items-center space-x-2.5">
                  <i className="fa-solid fa-qrcode text-xl text-red-500 animate-pulse"></i>
                  <div>
                    <h3 className="font-extrabold text-xs tracking-wider uppercase">Pindai QR Tiket Kerja Vendor</h3>
                    <p className="text-[10px] text-slate-400">Verifikasi Mulai/Selesai Kerja melalui kamera</p>
                  </div>
                </div>
                <button onClick={stopQrScanner} className="p-1 hover:bg-white/10 rounded-lg text-slate-400 hover:text-white">
                  <i className="fa-solid fa-xmark text-lg"></i>
                </button>
              </div>

              <div className="p-5 space-y-4">
                
                {/* CAMERA VIEWPORT CONTAINER */}
                {!scannedResult && (
                  <div className="space-y-4">
                    <div id="qr-reader-viewport" className="w-full rounded-xl overflow-hidden border border-slate-300 bg-slate-50 shadow-inner"></div>
                    
                    {scanErrorMsg && (
                      <p className="text-red-600 text-xs text-center font-bold bg-red-50 p-2.5 rounded-lg border border-red-200 animate-shake">
                        {scanErrorMsg}
                      </p>
                    )}

                    {/* MANUAL FALLBACK INPUT FIELD */}
                    <form onSubmit={handleManualPtwSubmit} className="pt-2 border-t border-dashed border-slate-200 font-serif">
                      <label className="block text-[10px] font-black text-slate-500 uppercase tracking-wide mb-1 font-sans">Pencarian PTW ID Manual:</label>
                      <div className="flex gap-2">
                        <input 
                          type="text" 
                          placeholder="Masukkan ID PTW (Contoh: PTW-832912)"
                          value={manualPtwIdInput}
                          onChange={(e) => setManualPtwIdInput(e.target.value)}
                          className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-xl text-xs font-mono font-bold uppercase tracking-wider outline-none focus:ring-1 focus:ring-red-600"
                        />
                        <button type="submit" className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-extrabold rounded-xl text-xs font-sans">
                          Cari
                        </button>
                      </div>
                    </form>
                  </div>
                )}

                {/* SCANNED PERMIT PREVIEW AND WORKFLOW CONTEXT ACTIONS */}
                {scannedResult && (
                  <div className="space-y-4 animate-fade-in text-xs font-serif">
                    <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl space-y-2.5">
                      <div className="flex justify-between items-center border-b pb-2">
                        <span className="font-mono font-black text-red-600">{scannedResult.id}</span>
                        <span className="px-2.5 py-0.5 bg-yellow-500 text-white font-bold rounded text-[9px] uppercase tracking-wide font-sans">
                          {scannedResult.status}
                        </span>
                      </div>
                      
                      <div className="space-y-1.5 text-[11px] leading-snug">
                        <p><strong>Nama Perusahaan:</strong> {scannedResult.vendor}</p>
                        <p><strong>Penanggung Jawab:</strong> {scannedResult.penanggungJawab}</p>
                        <p><strong>Jumlah Crew:</strong> {scannedResult.jumlahPekerja} Personel</p>
                        <p><strong>Jenis Pekerjaan:</strong> <span className="italic">{scannedResult.jenisPekerjaan}</span></p>
                        <p><strong>Daftar Kru:</strong> {scannedResult.personelList || "-"}</p>
                        <p><strong>Sektor Target:</strong> <span className="font-bold text-red-600">{scannedResult.lokasi.join(", ")}</span></p>
                        <p><strong>Waktu Izin:</strong> {scannedResult.tanggalMulai} s/d {scannedResult.tanggalSelesai}</p>
                      </div>
                    </div>

                    {/* DYNAMIC ACTION WORKFLOWS FOR SATPAM CHECK-IN/OUT */}
                    <div className="space-y-2 pt-3 border-t font-sans">
                      <p className="text-slate-500 font-extrabold text-[10px] tracking-wide uppercase">Operasi Lapangan Danru Satpam ({currentUser?.["Lokasi Tugas"]}):</p>
                      
                      <div className="grid grid-cols-2 gap-2">
                        {/* Check-In Action Button */}
                        <button 
                          onClick={() => executeQrAction("checkin")}
                          className="py-3 px-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-black text-xs transition flex flex-col items-center justify-center space-y-1"
                        >
                          <i className="fa-solid fa-play-circle text-lg"></i>
                          <span>VERIFIKASI & MULAI</span>
                        </button>

                        {/* Check-Out Action Button */}
                        <button 
                          onClick={() => executeQrAction("checkout")}
                          className="py-3 px-4 bg-red-600 hover:bg-red-700 text-white rounded-xl font-black text-xs transition flex flex-col items-center justify-center space-y-1"
                        >
                          <i className="fa-solid fa-stop-circle text-lg"></i>
                          <span>AKHIRI PEKERJAAN</span>
                        </button>
                      </div>
                    </div>

                    <button 
                      onClick={() => setScannedResult(null)} 
                      className="w-full py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-xl text-xs font-sans"
                    >
                      Batal & Scan Ulang
                    </button>
                  </div>
                )}

              </div>
            </div>
          </div>
        )}

      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
